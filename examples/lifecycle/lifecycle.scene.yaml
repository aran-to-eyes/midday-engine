# examples/lifecycle/lifecycle.scene.yaml — the component_event_lifecycle
# golden scene (M2 node 0B, FUSED-SPEC D6): the LifecycleProbe prefab plus a
# DISTINCT Bystander entity — the injected contact.began's `other` ref (a
# same-ref payload would make the self/other-swap falsifier vacuous; the
# distinct entity is mandatory). Driven 241 ticks @ 60 Hz by
#
#   midday run examples/lifecycle/lifecycle.scene.yaml --ticks 241 --seed 7
#     --components examples/lifecycle/lifecycle.components.json
#     --assert case=component_event_lifecycle
#
# (the manifest is generated by `midday script extract` over
# components/lifecycle_components.ts and byte-pinned by the behavioral gate).
format: 1

scene: component_event_lifecycle

events:
  - lifecycle.events.yaml

entities:
  - entity: Probe
    prefab: {path: probe.entity.yaml}

  - entity: Bystander
    components:
      - Transform: {}
