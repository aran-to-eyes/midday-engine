# Parametric B-rep model — op-list is source of truth, mesh is compiled output.
params:
  shaftLen: {value: 1.1, min: 0.6, max: 1.6, doc: "handle length"}
  headR:    {value: 0.22}

ops:
  - cylinder: {id: shaft, r: 0.035, h: 'shaftLen', at: [0, 'shaftLen/2', 0]}
  - sphere:   {id: head, r: 'headR', at: [0, 'shaftLen + headR*0.6', 0]}
  - pattern:
      id: spikes
      of: {cone: {id: spike, r: 0.05, h: 0.12}}
      radial: {n: 8, around: head, axis: y}
  - union: [shaft, head, spikes]
  - fillet: {edges: 'head.edges(angle>40deg)', r: 0.015}
  - anchor: {id: grip, at: [0, 0.12, 0], dir: -y, doc: "hand socket"}
