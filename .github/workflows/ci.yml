# Midday Engine CI — M0 lanes that exist today (MILESTONE_0.md "M0 CI lanes"):
#   build-linux (+ sanitizer job), build-macos, build-windows, drift,
#   determinism (two Linux x86_64 hosts — m0-appendix-a-determinism;
#   m0-determinism-spike extends the lane with the kata scene),
#   boundaries + golden-software (m0-rhi-vulkan: RHI seam scan + headless
#   software-Vulkan goldens; golden-software is EXPECTED RED until the first
#   inspected goldens are committed — see the lane's bootstrap comment).
#
# Declared host tools (Aurora D-22): cmake, ninja, python3, git, jq, zstd,
# platform SDK tools. GitHub-hosted runners ship cmake/python3/git/jq/zstd;
# each job installs ninja explicitly.

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Mirrors the local gate EXACTLY (scripts/verify.sh, pinned lint toolchain).
  # If this job and a developer's local verify.sh ever disagree, that is a bug.
  verify-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: verify (full local gate)
        run: ./scripts/verify.sh

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: ninja -C build/ci
      - name: Envelope smoke (version --json, schema-validated)
        run: |
          build/ci/midday version --json | jq -e '.name=="midday"'
          build/ci/midday version --json | scripts/validate_envelope.py
      - name: Selftest
        run: build/ci/midday selftest
      - name: License scan (incl. negative fixture)
        run: scripts/test_license_scan.py
      - name: FP flag scan
        run: scripts/check_fp_flags.py build/ci/compile_commands.json

  sanitizer-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Configure (ASan + UBSan)
        run: cmake --preset sanitizer
      - name: Build
        run: ninja -C build/sanitizer
      - name: Selftest under sanitizers
        run: build/sanitizer/midday selftest
        env:
          ASAN_OPTIONS: strict_string_checks=1:detect_stack_use_after_return=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  # The drift lane (m0-api-json + m0-codegen-selfhost): the committed
  # api/engine_api.json must be byte-identical to a fresh `midday api dump`
  # and valid against its meta-schema; the four committed codegen artifacts
  # (engine.d.ts, schema_manifest.json, api_docs.md, bindings_spec.json)
  # must be byte-identical to a fresh SELF-HOSTED regeneration, and the
  # self-hosted generator must stay byte-equivalent to the TEMPORARY native
  # bootstrap (standing gate until the bootstrap tool retires post-M0).
  drift:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: ninja -C build/ci midday codegen_bootstrap
      - name: engine_api.json drift (dump twice, byte-compare, committed diff)
        run: |
          build/ci/midday api dump --out build/ci/engine_api.json
          build/ci/midday api dump --out build/ci/engine_api.rerun.json
          cmp build/ci/engine_api.json build/ci/engine_api.rerun.json
          cmp api/engine_api.json build/ci/engine_api.json
      - name: engine_api.json meta-schema + envelope shape
        run: |
          python3 scripts/validate_envelope.py formats/engine_api.schema.json < api/engine_api.json
          build/ci/midday api dump --json | jq -e '.ok and (.api.api_compat_hash | test("^[0-9a-f]{16}$"))'
          build/ci/midday api diff api/engine_api.json
      - name: codegen drift (selfhost dual runs byte-compared + committed artifacts)
        run: |
          build/ci/midday api codegen api/engine_api.json --out-dir build/ci/codegen --cache-dir build/ci/ts-cache.codegen
          build/ci/midday api codegen api/engine_api.json --out-dir build/ci/codegen.rerun --cache-dir build/ci/ts-cache.codegen
          for f in engine.d.ts schema_manifest.json api_docs.md bindings_spec.json; do
            cmp "build/ci/codegen/$f" "build/ci/codegen.rerun/$f"
            cmp "api/$f" "build/ci/codegen/$f"
          done
      - name: codegen byte-equivalence (selfhost vs bootstrap, standing gate)
        run: build/ci/midday api codegen --verify-equivalence --cache-dir build/ci/ts-cache.codegen
      - name: schema_manifest.json meta-schema
        run: python3 scripts/validate_envelope.py formats/schema_manifest.schema.json < api/schema_manifest.json

  # The determinism lane (m0-appendix-a-determinism, Determinism Scope
  # Aurora D-9): two INDEPENDENT Linux x86_64 hosts each drive the authored
  # Appendix A corpus to tick 3200 three times (seed 7, assert pack on) and
  # hash the NORMALIZED journal — the decompressed record stream
  # (zstdcat journal.jsonl.zst), per D-BUILD-080: compression framing is
  # transport, record content is the run. Within a host the 3 hashes must
  # agree AND two independent bundles must `journal diff` clean (bit-identity
  # is two runs diffed, never a self-diff — Zenith N017). The compare job
  # then byte-compares the hashes ACROSS hosts; on mismatch it runs
  # `midday journal diff` and surfaces the first divergent tick in the log.
  determinism:
    strategy:
      fail-fast: false
      matrix:
        host: [a, b]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: ninja -C build/ci midday
      - name: Appendix A x3 (assert pack + normalized sha256)
        run: |
          mkdir -p build/det
          : > build/det/hashes.txt
          for i in 1 2 3; do
            build/ci/midday run examples/appendix_a/boss.scene.yaml --to-tick 3200 --seed 7 \
              --record "build/det/run$i.mrj" --cache-dir build/det/ts-cache \
              --assert case=appendix_a_golden --json | jq -e \
              '.ok and .assertions.combat_transitions_at_3200==1
               and .assertions.hurtbox_inactive_before_dead_enter
               and .assertions.voided_stagger
               and .assertions.locomotion_still_chasing
               and .assertions.cause_chain_complete' > /dev/null
            zstdcat "build/det/run$i.mrj/journal.jsonl.zst" \
              | sha256sum | cut -d' ' -f1 >> build/det/hashes.txt
          done
          cat build/det/hashes.txt
          test "$(sort -u build/det/hashes.txt | wc -l)" -eq 1
      - name: Within-host independent dual-run diff
        run: |
          build/ci/midday journal diff build/det/run1.mrj build/det/run2.mrj --json \
            | jq -e '.first_divergent_tick==null and .identical'
      - name: Stage exchange artifact (host a also ships the diff binary)
        run: |
          mkdir -p build/det/exchange
          cp build/det/hashes.txt build/det/exchange/
          cp -r build/det/run1.mrj build/det/exchange/run1.mrj
          if [ "${{ matrix.host }}" = "a" ]; then cp build/ci/midday build/det/exchange/; fi
      - uses: actions/upload-artifact@v4
        with:
          name: determinism-${{ matrix.host }}
          path: build/det/exchange
          retention-days: 3

  determinism-compare:
    needs: determinism
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: determinism-a
          path: host-a
      - uses: actions/download-artifact@v4
        with:
          name: determinism-b
          path: host-b
      - name: Cross-host normalized byte-compare (3x sha256 each)
        run: |
          echo "host a:"; cat host-a/hashes.txt
          echo "host b:"; cat host-b/hashes.txt
          if ! cmp host-a/hashes.txt host-b/hashes.txt; then
            echo "::error::cross-host journal divergence — first divergent tick follows"
            chmod +x host-a/midday
            host-a/midday journal diff host-a/run1.mrj host-b/run1.mrj --json | tee divergence.json || true
            jq '.first_divergent_tick, .divergence' divergence.json
            exit 1
          fi

  build-macos:
    # Hosted macOS arm64 — never the managed-firewall dev Mac (Zenith D027).
    # m0-rhi-metal makes this THE native-Metal lane: hosted runners expose
    # Metal through the "Apple Paravirtual device" (a real GPU-backed
    # virtual device, not a software rasterizer), verified by the probe gate
    # below. If a future runner image ever loses the Metal device, this lane
    # goes red at the probe — the documented fallback is corpus-on-null +
    # LOCAL-gate-only compare (D-BUILD-099), never a silently skipped step.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja + MoltenVK (the Vulkan seam's macOS transport)
        run: brew install ninja molten-vk vulkan-loader
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: ninja -C build/ci
      - name: Envelope smoke (version --json, schema-validated)
        run: |
          build/ci/midday version --json | jq -e '.name=="midday"'
          build/ci/midday version --json | scripts/validate_envelope.py
      - name: Metal probe — the hosted runner must expose a Metal device
        run: |
          # No pipes around gating commands (golden-software precedent).
          build/ci/midday rhi probe --backend metal --json > build/ci/metal-probe.json
          cat build/ci/metal-probe.json
          jq -e '.available' build/ci/metal-probe.json
      - name: Selftest (rhi conformance corpus gates NullDevice + native Metal)
        run: |
          # Metal skips are FORBIDDEN on macOS (the corpus zz report enforces
          # it). DELIBERATELY no MoltenVK env here: each gate proves ONE
          # claim — this step is the native-Metal conformance gate, and a
          # MoltenVK fault in the same process must not be able to take the
          # Metal verdict down with it (2026-07-04 incident: an ObjC
          # exception during shared-registry bring-up killed all 13
          # registry-touching cases; escapes now map to structured
          # rhi.device_fault, D-BUILD-100). MoltenVK enters only in the
          # compare step below, behind its own probe; the Vulkan corpus rows
          # are gated by golden-software (lavapipe guaranteed).
          build/ci/midday selftest
      - name: Cross-backend compare — SAME scenes through native Metal AND Vulkan, tier 2
        run: |
          # MILESTONE_0 item 23: the RHI demonstrably spans two dissimilar
          # APIs. Tier-2 tolerance is the cross-backend gate (two-tier
          # semantics, D-BUILD-090); hash equality may incidentally hold when
          # both paths hit the same GPU, but is never required here.
          #
          # NOT via DYLD_LIBRARY_PATH: SIP strips DYLD_* when the protected
          # shell execs children, so the export never reaches midday on the
          # runner (first red run proved it). /usr/local/lib is on dyld's
          # DEFAULT fallback path — a symlink there survives SIP.
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "$(brew --prefix)"/lib/libvulkan*.dylib /usr/local/lib/
          export VK_ICD_FILENAMES="$(brew --prefix)/etc/vulkan/icd.d/MoltenVK_icd.json"
          build/ci/midday rhi probe --json > build/ci/vk-probe.json
          cat build/ci/vk-probe.json
          if ! jq -e '.available' build/ci/vk-probe.json > /dev/null; then
            # D-BUILD-099/101 fallback, taken LOUDLY: MoltenVK on the hosted
            # paravirtual device raises at creation (contained as
            # rhi.device_fault since D-BUILD-101). The cross-backend proof
            # stands on real hardware: native Metal vs MoltenVK on Apple M4,
            # tier-1 hash-identical all three scenes (m0-rhi-metal node
            # report + ledger). This step degrades to Metal-only rendering
            # so the artifacts still upload; it must NOT silently pass if
            # METAL is unavailable — that stays a hard gate above.
            echo "::warning::cross-backend compare degraded: Vulkan/MoltenVK unavailable on this runner class (see vk-probe.json); local M4 verdict is the standing evidence"
            mkdir -p build/ci/cross-backend
            build/ci/midday rhi render --backend metal --out-dir build/ci/cross-backend/metal --json > build/ci/cross-backend/render-metal.json
            exit 0
          fi
          mkdir -p build/ci/cross-backend
          build/ci/midday rhi render --backend metal --out-dir build/ci/cross-backend/metal --json > build/ci/cross-backend/render-metal.json
          build/ci/midday rhi render --backend vulkan --out-dir build/ci/cross-backend/vulkan --json > build/ci/cross-backend/render-vulkan.json
          for scene in clear triangle textured_quad; do
            build/ci/midday shot compare \
              "build/ci/cross-backend/metal/$scene.png" "build/ci/cross-backend/vulkan/$scene.png" \
              --diff "build/ci/cross-backend/diff_$scene.png" --json \
              > "build/ci/cross-backend/verdict_$scene.json"
            cat "build/ci/cross-backend/verdict_$scene.json"
            jq -e '.pass' "build/ci/cross-backend/verdict_$scene.json"
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m0-cross-backend-compare
          path: build/ci/cross-backend
          retention-days: 14
      - name: Appendix A golden — semantic report (bytes NON-GATING here, Aurora D-9)
        run: |
          # macOS arm64 gates SEMANTICS: the five A.3 verdicts and a same-
          # host independent dual-run record diff. The cross-host BYTE
          # compare is deliberately absent on this platform — pinned-
          # platform byte equality is the Linux determinism lane's contract;
          # this step reports the normalized hash for the record only.
          mkdir -p build/det
          for i in 1 2; do
            build/ci/midday run examples/appendix_a/boss.scene.yaml --to-tick 3200 --seed 7 \
              --record "build/det/run$i.mrj" --cache-dir build/det/ts-cache \
              --assert case=appendix_a_golden --json | jq -e \
              '.ok and .assertions.combat_transitions_at_3200==1
               and .assertions.hurtbox_inactive_before_dead_enter
               and .assertions.voided_stagger
               and .assertions.locomotion_still_chasing
               and .assertions.cause_chain_complete'
          done
          build/ci/midday journal diff build/det/run1.mrj build/det/run2.mrj --json \
            | jq -e '.first_divergent_tick==null and .identical'
          echo "normalized journal sha256 (report only, non-gating):"
          zstdcat build/det/run1.mrj/journal.jsonl.zst | shasum -a 256 | cut -d' ' -f1

  # boundaries (m0-rhi-vulkan): no backend headers above the RHI seam —
  # vulkan/volk/VMA only under core/rhi/vulkan/, glslang/SPIRV only under
  # core/rhi/shadercomp/, Metal only under core/rhi/metal/. Pure source
  # scan, any runner, no build. (The lane table's second clause — "no public
  # code-assembled entity API" — is currently structural: the loader is the
  # only spawn path; a scan for it joins when a public C++ scene API exists
  # to police.) The self-test proves the scanner still catches planted
  # violations before the clean scan is trusted.
  boundaries:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Boundary scanner self-test
        run: python3 scripts/check_include_boundaries.py --self-test
      - name: RHI include boundaries
        run: python3 scripts/check_include_boundaries.py

  # golden-software (m0-rhi-vulkan): headless GPU render on SOFTWARE Vulkan
  # (Mesa lavapipe) inside a plain ubuntu:24.04 container — no X11/Wayland
  # sockets exist here, which is the point: headless render -> PNG is a
  # launch requirement, not a mode (spec section 15).
  #
  # GOLDEN BOOTSTRAP (how the first green happens — read before "fixing"):
  #   1. Fresh tree: testkit/goldens/m0 has no <scene>.hash and no
  #      DRIVER_PIN.txt, so `midday rhi render --goldens` exits 1 with
  #      rhi.golden_missing and this lane is RED. Deliberately: a stubbed
  #      green would un-falsify the gate (never make this step pass on
  #      missing goldens).
  #   2. The run still uploads the rendered PNGs + decoded-pixel .hash files
  #      + driver.txt as the 'm0-goldens-candidate' artifact (if: always()).
  #   3. The orchestrator INSPECTS the PNGs (AGENTS.md visual gate: goldens
  #      are born only from inspected images), then commits the .hash files
  #      and driver.txt as testkit/goldens/m0/{clear,triangle,textured_quad}
  #      .hash + DRIVER_PIN.txt. Re-run: green.
  #   4. Hash-equal comparison is valid only within the pinned driver class
  #      (spec section 5 two-tier semantics). If this container's mesa ever
  #      ships a different llvmpipe build string, the verb refuses with
  #      rhi.golden_driver_mismatch -> lane red -> re-inspect + re-mint via
  #      the same candidate flow. The pin is the DRIVER STRING, enforced at
  #      compare time, so a silently drifting runner can never corrupt
  #      goldens.
  golden-software:
    runs-on: ubuntu-24.04
    container: ubuntu:24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + software Vulkan (declared host tools + Mesa lavapipe)
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential cmake ninja-build python3 git jq zstd \
            libvulkan1 mesa-vulkan-drivers
      - name: Configure + build
        run: |
          cmake --preset ci
          ninja -C build/ci midday
      - name: Probe — a SOFTWARE device must exist, display-less
        run: |
          # No pipes around gating commands: the container shell has no
          # pipefail, and `| tee` swallowed a real exit-1 once (2026-07-04).
          build/ci/midday rhi probe --software --json > build/ci/probe.json
          cat build/ci/probe.json
          jq -e '.available and .caps.software' build/ci/probe.json
      - name: rhi selftests against lavapipe (skips are impossible here)
        run: |
          MIDDAY_RHI_GOLDEN_DIR=testkit/goldens/m0 build/ci/midday selftest --filter 'rhi.*'
      - name: Render M0 scenes + compare DECODED-PIXEL hashes against goldens
        run: |
          build/ci/midday rhi render --software \
            --out-dir build/ci/goldens-candidate \
            --goldens testkit/goldens/m0 --json > build/ci/render.json
          RC=$?
          cat build/ci/render.json
          exit $RC
      - name: Stage candidate report next to the images
        if: always()
        run: |
          cp build/ci/probe.json build/ci/render.json build/ci/goldens-candidate/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m0-goldens-candidate
          path: build/ci/goldens-candidate
          retention-days: 14

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Enter MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install ninja
        run: choco install ninja -y
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: ninja -C build/ci
      - name: Envelope smoke (version --json, schema-validated)
        shell: bash
        run: |
          build/ci/midday.exe version --json | jq -e '.name=="midday"'
          build/ci/midday.exe version --json | python3 scripts/validate_envelope.py
      - name: Selftest
        run: build/ci/midday.exe selftest
